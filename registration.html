<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Regestrstion form</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

<div class="container">
  <div class="card">

    <!-- LEFT SIDE -->
    <div class="left">
      <h2>General Information</h2>

      <input type="text" placeholder="Title" />

      <div class="row">
        <input type="text" placeholder="First Name" />
        <input type="text" placeholder="Last Name" />
      </div>

      <input type="text" placeholder="Position" />
      <input type="text" placeholder="Company" />

      <div class="row">
        <input type="text" placeholder="Business Area" />
        <input type="text" placeholder="Employees" />
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
      <h2>Contact Details</h2>

      <input type="text" placeholder="Street + Nr" />
      <input type="text" placeholder="Additional Information" />

      <div class="row">
        <input type="text" placeholder="Zip Code" />
        <input type="text" placeholder="Place" />
      </div>

      <input type="text" placeholder="Country" />

      <div class="row">
        <input type="text" placeholder="Code +" />
        <input type="text" placeholder="Phone Number" />
      </div>

      <input type="email" placeholder="Your Email" />

      <label>
        <input type="checkbox" />
        I accept the Terms and Conditions of your site.
      </label>

      <button>Register Badge</button>
    </div>

  </div>
</div>

</body>
</html>
